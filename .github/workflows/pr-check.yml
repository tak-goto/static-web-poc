name: PR Check — Lint & Build

# Runs on every Pull Request to main or production.
# Blocks merge if lint or build fails.
# Detects template/design-system changes and adds HITL warning.

on:
  pull_request:
    branches: [main, staging, production]

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Post-build lint
        run: npm run lint

      - name: HITL — Detect template / design-system changes
        id: hitl
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '^(templates/|design-system/)' || true)
          if [ -n "$CHANGED" ]; then
            echo "hitl_required=true" >> $GITHUB_OUTPUT
            echo "changed_files=$CHANGED" >> $GITHUB_OUTPUT
            echo '::warning::HITL required: template or design-system files changed'
          else
            echo "hitl_required=false" >> $GITHUB_OUTPUT
          fi

      - name: HITL — Comment on PR if templates changed
        if: steps.hitl.outputs.hitl_required == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const files = `${{ steps.hitl.outputs.changed_files }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## ⚠️ HITL Required — Template / Design System Changes Detected',
                '',
                'This PR modifies files that affect **all pages**. Human review is mandatory before merge.',
                '',
                '**Changed files:**',
                '```',
                files,
                '```',
                '',
                '**Checklist before approving:**',
                '- [ ] Preview has been checked visually',
                '- [ ] Design tokens are not broken',
                '- [ ] All pages render correctly',
                '- [ ] Lint passes (check Actions tab)',
              ].join('\n')
            });
