name: Production — Build, Deploy & Release

on:
  push:
    branches: [production]
  workflow_dispatch:
    inputs:
      rollback_tag:
        description: |
          ロールバック先のタグ（例: v2026.03.12-1）。
          指定すると既存 dist.zip を再デプロイしビルドをスキップ。
          空白のままにすると通常ビルド。
        required: false
        type: string

permissions:
  contents: write   # Release作成・tag push に必要
  pages: write
  id-token: write

concurrency:
  group: production
  cancel-in-progress: false   # 本番デプロイは中断しない

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      css_version: ${{ steps.build.outputs.css_version }}
      is_rollback: ${{ steps.rollback.outputs.is_rollback }}
      rollback_tag: ${{ steps.rollback.outputs.rollback_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 全履歴取得 (release notes・HITL guard に必要)

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # ─── ロールバックモード判定 ────────────────────────────────────
      - name: Check rollback mode
        id: rollback
        run: |
          TAG="${{ github.event.inputs.rollback_tag }}"
          if [ -n "$TAG" ]; then
            echo "is_rollback=true"  >> $GITHUB_OUTPUT
            echo "rollback_tag=${TAG}" >> $GITHUB_OUTPUT
            echo "::notice::🔄 ROLLBACK MODE: restoring ${TAG}"
          else
            echo "is_rollback=false" >> $GITHUB_OUTPUT
            echo "rollback_tag="     >> $GITHUB_OUTPUT
            echo "::notice::🔨 BUILD MODE: normal build"
          fi

      # ─── ロールバック: dist.zip を GitHub Release から取得 ─────────
      - name: Rollback — download dist.zip from Release
        if: steps.rollback.outputs.is_rollback == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.rollback.outputs.rollback_tag }}"
          echo "Downloading dist.zip from Release ${TAG}..."
          gh release download "${TAG}" --pattern "dist.zip" --repo ${{ github.repository }}
          unzip dist.zip
          echo "Rollback dist/ ready."

      # ─── 通常ビルド ────────────────────────────────────────────────
      - name: Install dependencies
        if: steps.rollback.outputs.is_rollback == 'false'
        run: npm install

      - name: Lint (pre-build)
        if: steps.rollback.outputs.is_rollback == 'false'
        run: npm run lint

      # HITL guard — push イベント時のみ実行
      # workflow_dispatch 時はスキップ（ロールバック・手動再デプロイ用途のため）
      - name: HITL — block direct push of template/design-system changes
        if: github.event_name == 'push'
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E '^(templates/|design-system/)' || true)
          if [ -z "$CHANGED" ]; then
            echo "No template/design-system changes — OK."
            exit 0
          fi
          COMMIT_MSG=$(git log -1 --format=%s)
          IS_MERGE=$(echo "$COMMIT_MSG" | grep -c '^Merge pull request' || true)
          if [ "$IS_MERGE" -eq 0 ]; then
            echo "::error::🚫 HITL violation: templates/ or design-system/ modified via direct push."
            echo "$CHANGED" | sed 's/^/::error::  /'
            echo "::error::Use a PR. See GOVERNANCE.md."
            exit 1
          else
            echo "✓ PR merge — template changes allowed."
          fi

      - name: Build
        id: build
        if: steps.rollback.outputs.is_rollback == 'false'
        run: |
          npm run build
          CSS_V=$(grep -oP '(?<=style\.css\?v=)[a-f0-9]+' dist/index.html | head -1)
          echo "css_version=${CSS_V}" >> $GITHUB_OUTPUT

      - name: Lint (post-build)
        if: steps.rollback.outputs.is_rollback == 'false'
        run: npm run lint

      - name: Verify no unresolved placeholders
        if: steps.rollback.outputs.is_rollback == 'false'
        run: |
          grep -rl '{{' dist/ && echo '::error::Unresolved placeholders found!' && exit 1 || echo 'dist/ is clean.'

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      # dist.zip を Release 用に保存（通常ビルド時のみ。ロールバック時は再添付不要）
      - name: Archive dist for Release
        if: steps.rollback.outputs.is_rollback == 'false'
        run: zip -r dist.zip dist/

      - uses: actions/upload-artifact@v4
        if: steps.rollback.outputs.is_rollback == 'false'
        with:
          name: dist-zip
          path: dist.zip
          retention-days: 90

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

  release:
    needs: [build, deploy]
    runs-on: ubuntu-latest
    # ロールバック時は新規 Release を作成しない（既存タグを保持する）
    if: needs.build.outputs.is_rollback == 'false'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 日付ベースのタグを生成: v2026.03.12-1, v2026.03.12-2, ...
      - name: Generate release tag
        id: tag
        run: |
          DATE=$(date -u +%Y.%m.%d)
          BASE="v${DATE}"
          N=1
          while git tag -l "${BASE}-${N}" | grep -q .; do
            N=$((N+1))
          done
          TAG="${BASE}-${N}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Generated tag: ${TAG}"

      # 前回 Release からの変更を収集して release notes 生成
      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -1)
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
            HEADER="Initial release"
          else
            RANGE="${PREV_TAG}..HEAD"
            HEADER="Changes since ${PREV_TAG}"
          fi
          COMMITS=$(git log ${RANGE} --pretty=format:"- %s (%h)" --no-merges | head -30)
          CSS_V="${{ needs.build.outputs.css_version }}"
          NOTES=$(cat << ENDNOTES
          ## ${HEADER}

          ${COMMITS}

          ---
          **Build info**
          - CSS fingerprint: \`${CSS_V}\`
          - Deployed: $(date -u +"%Y-%m-%d %H:%M UTC")
          - Commit: \`${GITHUB_SHA:0:8}\`

          **Rollback手順**
          Actions → production.yml → Run workflow → rollback_tag に このタグを入力
          ENDNOTES
          )
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES"     >> $GITHUB_OUTPUT
          echo "EOF"        >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          name: dist-zip

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag   = '${{ steps.tag.outputs.tag }}';
            const notes = `${{ steps.notes.outputs.notes }}`;
            const fs    = require('fs');

            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              ref:   `refs/tags/${tag}`,
              sha:   context.sha,
            });

            const release = await github.rest.repos.createRelease({
              owner:       context.repo.owner,
              repo:        context.repo.repo,
              tag_name:    tag,
              name:        `Release ${tag}`,
              body:        notes,
              draft:       false,
              prerelease:  false,
              make_latest: 'true',
            });

            const zip = fs.readFileSync('dist.zip');
            await github.rest.repos.uploadReleaseAsset({
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              release_id: release.data.id,
              name:       'dist.zip',
              data:       zip,
            });

            console.log(`Release created: ${release.data.html_url}`);
