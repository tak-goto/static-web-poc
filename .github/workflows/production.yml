name: Production — Build & Deploy

on:
  push:
    branches: [production]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Lint (pre-build)
        run: npm run lint

      # ─── HITL guard (production も同様に適用) ──────────────────────
      - name: HITL — block direct push of template/design-system changes
        if: github.event_name == 'push'
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E '^(templates/|design-system/)' || true)
          if [ -z "$CHANGED" ]; then
            echo "No template/design-system changes — OK."
            exit 0
          fi

          COMMIT_MSG=$(git log -1 --format=%s)
          IS_MERGE=$(echo "$COMMIT_MSG" | grep -c '^Merge pull request' || true)

          if [ "$IS_MERGE" -eq 0 ]; then
            echo "::error::🚫 HITL violation: templates/ or design-system/ were modified in a direct push."
            echo "$CHANGED" | sed 's/^/::error::  /'
            echo "::error::Use a PR. See GOVERNANCE.md."
            exit 1
          else
            echo "✓ PR merge detected — template changes allowed."
          fi
      # ───────────────────────────────────────────────────────────────

      - name: Build
        run: npm run build

      - name: Lint (post-build)
        run: npm run lint

      - name: Verify no unresolved placeholders in dist
        run: |
          grep -rl '{{' dist/ && echo '::error::Unresolved placeholders found in dist!' && exit 1 || echo 'dist/ is clean.'

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
