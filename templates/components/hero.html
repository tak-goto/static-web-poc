{{#if_hero}}
<section class="hero">
  <div class="container">
    <div class="hero__copy">
      <p class="hero__eyebrow">{{hero_eyebrow}}</p>
      <h1 class="hero__heading">{{hero_heading}}</h1>
      <p class="hero__lead">{{hero_lead}}</p>
      <div class="hero__actions">
        <a href="{{hero_primary_cta_url}}" class="btn btn--primary">{{hero_primary_cta_label}}</a>
        <a href="{{hero_secondary_cta_url}}" class="btn btn--outline">{{hero_secondary_cta_label}}</a>
      </div>
    </div>
  </div>
</section>

<style>
.hero {
  padding-block: var(--space-24);
  background: linear-gradient(135deg, var(--color-brand-50) 0%, var(--color-neutral-0) 60%);
}
.hero__eyebrow {
  font-size: var(--text-sm);
  font-weight: var(--font-weight-semibold);
  color: var(--color-accent);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: var(--space-3);
}
.hero__heading {
  font-size: var(--text-5xl);
  font-weight: var(--font-weight-bold);
  line-height: var(--leading-tight);
  margin-bottom: var(--space-6);
  max-width: 18ch;
}
.hero__lead {
  font-size: var(--text-lg);
  color: var(--color-text-muted);
  max-width: 50ch;
  margin-bottom: var(--space-8);
}
.hero__actions {
  display: flex;
  gap: var(--space-4);
  flex-wrap: wrap;
}
</style>
{{/if_hero}}
